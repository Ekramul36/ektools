<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — EkZapp</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563EB;--blue-dk:#1D4ED8;--ink:#111827;--gray:#6B7280;--border:#E5E7EB;--white:#fff;--light:#F9FAFB;--cream:#F0F5FF}
body{font-family:'Inter',sans-serif;background:var(--light);color:var(--ink);min-height:100vh}
nav{background:var(--white);border-bottom:1px solid var(--border);height:54px;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center}
.logo{text-decoration:none;display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:800}
.logo-text{font-size:15px;font-weight:700;color:var(--ink)}
.logo-text span{color:var(--blue)}
.back{margin-left:auto;color:var(--gray);text-decoration:none;font-size:13px;font-weight:500;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:white}
.container{max-width:720px;margin:40px auto;padding:0 20px}
.tool-header{text-align:center;margin-bottom:32px}
.tool-icon{font-size:2.5rem;margin-bottom:12px}
.tool-header h1{font-size:1.8rem;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.tool-header p{color:var(--gray);font-size:14px}
.card{background:white;border:1px solid var(--border);border-radius:12px;padding:24px}
.controls{display:flex;gap:12px;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap}
.field{flex:1;min-width:120px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
.field input,.field select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;outline:none;background:white}
.btn{padding:10px 24px;background:var(--blue);color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.btn:hover{background:var(--blue-dk)}
.result{background:var(--cream);border:1px solid #BFDBFE;border-radius:8px;padding:16px;min-height:120px;font-size:13.5px;line-height:1.7;white-space:pre-wrap;display:none}
.result.show{display:block}
.copy-btn{margin-top:12px;padding:8px 20px;background:var(--blue);color:white;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:none}
.copy-btn.show{display:inline-block}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="logo" href="/"><div class="logo-icon">EZ</div><span class="logo-text">Ek<span>Zapp</span></span></a>
    <a class="back" href="/">← All Tools</a>
  </div>
</nav>
<div class="container">
  <div class="tool-header">
    <div class="tool-icon">📋</div>
    <h1>Lorem Ipsum Generator</h1>
    <p>Generate dummy placeholder text instantly</p>
  </div>
  <div class="card">
    <div class="controls">
      <div class="field">
        <label>Number of Paragraphs</label>
        <input type="number" id="num" value="3" min="1" max="20">
      </div>
      <div class="field">
        <label>Start with Lorem Ipsum?</label>
        <select id="startLorem">
          <option value="yes">Yes</option>
          <option value="no">No (Random)</option>
        </select>
      </div>
      <button class="btn" onclick="generate()">Generate</button>
    </div>
    <div class="result" id="result"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyText()">Copy to Clipboard</button>
  </div>
</div>
<script>
const sentences=[
  'Lorem ipsum dolor sit amet, consectetur adipiscing elit.',
  'Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.',
  'Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi.',
  'Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore.',
  'Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia.',
  'Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit.',
  'Neque porro quisquam est qui dolorem ipsum quia dolor sit amet consectetur.',
  'Ut labore et dolore magnam aliquam quaerat voluptatem ut enim ad minima.',
  'Quis autem vel eum iure reprehenderit qui in ea voluptate velit esse quam.',
  'Nam libero tempore cum soluta nobis est eligendi optio cumque nihil impedit.',
];
let lastText='';
function generate(){
  const n=parseInt(document.getElementById('num').value)||3;
  const startLorem=document.getElementById('startLorem').value==='yes';
  const paras=[];
  for(let i=0;i<n;i++){
    const p=[];
    if(i===0&&startLorem){p.push(sentences[0]);p.push(sentences[1]);}
    const count=4+Math.floor(Math.random()*3);
    while(p.length<count)p.push(sentences[Math.floor(Math.random()*sentences.length)]);
    paras.push(p.join(' '));
  }
  lastText=paras.join('\n\n');
  const el=document.getElementById('result');
  el.textContent=lastText;
  el.classList.add('show');
  document.getElementById('copyBtn').classList.add('show');
}
function copyText(){
  navigator.clipboard.writeText(lastText).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy to Clipboard',2000);
  });
}
</script>
</body>
</html>
