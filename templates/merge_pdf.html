<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF - EkTools</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">
        <h2>🚀 EkTools</h2>
    </div>

    <nav>
        <a href="/">Home</a>
        <a href="/unlock-pdf">PDF Tools</a>
        <a href="/image">Image Tools</a>
        <a href="#">Converters</a>
        <a href="/about">About</a>
    </nav>
</header>

<section class="hero">

    <h1><i class="fa-solid fa-file-pdf"></i> Merge PDF</h1>

    <p>
        Merge multiple PDF files into a single PDF instantly.
    </p>

</section>

<section class="tools">

    <div class="card">

        <h2><i class="fa-solid fa-file-pdf"></i> Upload PDFs</h2>

        {% if error %}
        <div style="
            background:#ffe6e6;
            color:#c62828;
            border:1px solid #ffb3b3;
            padding:12px;
            border-radius:8px;
            margin-bottom:20px;
            text-align:center;
            font-weight:bold;
        ">
            <i class="fa-solid fa-circle-xmark"></i>
            {{ error }}
        </div>
        {% endif %}

        <form action="/merge-pdf" method="POST" enctype="multipart/form-data">

            <label class="upload-box">

                <i class="fa-solid fa-file-pdf"></i>

                <p>Click to choose PDF files</p>

                <input
                    type="file"
                    name="pdfs"
                    id="pdfs"
                    accept=".pdf"
                    multiple
                    required>

                <div class="file-name" id="file-name">
                    No file selected
                </div>

            </label>

            <br>

            <button class="btn" type="submit">
                <i class="fa-solid fa-object-group"></i>
                Merge PDF
            </button>

            <br><br>

            <a href="/" class="btn">
                <i class="fa-solid fa-house"></i>
                Back to Home
            </a>

        </form>

    </div>

</section>

<footer>
    <p>© 2026 EkTools. All Rights Reserved.</p>
</footer>

<script>
const input = document.getElementById("pdfs");
const fileName = document.getElementById("file-name");

input.addEventListener("change", function () {

    if (this.files.length === 0) {
        fileName.innerHTML = "No file selected";
    } else if (this.files.length === 1) {
        fileName.innerHTML = this.files[0].name;
    } else {
        fileName.innerHTML = this.files.length + " PDF files selected";
    }

});
</script>

</body>
</html>
