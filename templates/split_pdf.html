<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split PDF - EkTools</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">
        <h2>🚀 EkTools</h2>
    </div>

    <nav>
        <a href="/">Home</a>
        <a href="/unlock-pdf">Unlock PDF</a>
        <a href="/merge-pdf">Merge PDF</a>
        <a href="/split-pdf">Split PDF</a>
        <a href="/about">About</a>
    </nav>
</header>

<section class="hero">

    <h1>
        <i class="fa-solid fa-scissors"></i>
        Split PDF
    </h1>

    <p>
        Split a PDF into multiple pages quickly and securely.
    </p>

</section>

<section class="tools">

    <div class="card">

        <h2>
            <i class="fa-solid fa-file-pdf"></i>
            Upload PDF
        </h2>

        {% if error %}
        <div style="
            background:#ffe6e6;
            color:#c62828;
            border:1px solid #ffb3b3;
            padding:12px;
            border-radius:8px;
            margin-bottom:20px;
            text-align:center;
            font-weight:bold;
        ">
            {{ error }}
        </div>
        {% endif %}

        <form action="/split-pdf" method="POST" enctype="multipart/form-data">

            <label class="upload-box">

                <i class="fa-solid fa-file-pdf"></i>

                <p>Click to choose PDF</p>

                <input
                    type="file"
                    id="pdf"
                    name="pdf"
                    accept=".pdf"
                    required>

                <div class="file-name" id="file-name">
                    No file selected
                </div>

            </label>

            <br>

            <input
                type="text"
                name="pages"
                placeholder="Example: 1-3 or 5"
                required>

            <br>

            <button class="btn" type="submit">
                <i class="fa-solid fa-scissors"></i>
                Split PDF
            </button>

        </form>

        <br><br>

        <a href="/" class="btn">
            <i class="fa-solid fa-house"></i>
            Back to Home
        </a>

    </div>

</section>

<footer>
    <p>© 2026 EkTools. All Rights Reserved.</p>
</footer>

<script>

const input=document.getElementById("pdf");
const fileName=document.getElementById("file-name");

input.addEventListener("change",function(){

    if(this.files.length>0){
        fileName.innerHTML=this.files[0].name;
    }else{
        fileName.innerHTML="No file selected";
    }

});

</script>

</body>
</html>
