<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator — EkZapp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563EB;--blue-dk:#1D4ED8;--ink:#111827;--gray:#6B7280;--border:#E5E7EB;--white:#fff;--light:#F9FAFB;--cream:#F0F5FF}
body{font-family:'Inter',sans-serif;background:var(--light);color:var(--ink);min-height:100vh}
nav{background:var(--white);border-bottom:1px solid var(--border);height:54px;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center;gap:12px}
.logo{text-decoration:none;display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:800}
.logo-text{font-size:15px;font-weight:700;color:var(--ink)}
.logo-text span{color:var(--blue)}
.back{margin-left:auto;color:var(--gray);text-decoration:none;font-size:13px;font-weight:500;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:white}
.back:hover{border-color:var(--blue);color:var(--blue)}
.container{max-width:560px;margin:40px auto;padding:0 20px}
.tool-header{text-align:center;margin-bottom:32px}
.tool-icon{font-size:2.5rem;margin-bottom:12px}
.tool-header h1{font-size:1.8rem;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.tool-header p{color:var(--gray);font-size:14px}
.card{background:white;border:1px solid var(--border);border-radius:12px;padding:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
.field input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border .15s}
.field input:focus{border-color:var(--blue)}
.btn{width:100%;padding:12px;background:var(--blue);color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;margin-bottom:16px}
.btn:hover{background:var(--blue-dk)}
.result{background:var(--cream);border:1px solid #BFDBFE;border-radius:8px;padding:16px;display:none}
.result.show{display:block}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.result-item{background:white;border-radius:8px;padding:12px;text-align:center;border:1px solid #BFDBFE}
.result-item strong{display:block;font-size:1.4rem;font-weight:800;color:var(--blue)}
.result-item span{font-size:11px;color:var(--gray)}
.result-extra{font-size:13px;color:#1E40AF;text-align:center}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="logo" href="/"><div class="logo-icon">EZ</div><span class="logo-text">Ek<span>Zapp</span></span></a>
    <a class="back" href="/">← All Tools</a>
  </div>
</nav>
<div class="container">
  <div class="tool-header">
    <div class="tool-icon">🎂</div>
    <h1>Age Calculator</h1>
    <p>Calculate your exact age from date of birth</p>
  </div>
  <div class="card">
    <div class="field">
      <label>Date of Birth</label>
      <input type="date" id="dob" max="">
    </div>
    <button class="btn" onclick="calcAge()">Calculate Age</button>
    <div class="result" id="result">
      <div class="result-grid">
        <div class="result-item"><strong id="years">0</strong><span>Years</span></div>
        <div class="result-item"><strong id="months">0</strong><span>Months</span></div>
        <div class="result-item"><strong id="days">0</strong><span>Days</span></div>
      </div>
      <p class="result-extra" id="extra"></p>
    </div>
  </div>
</div>
<script>
document.getElementById('dob').max = new Date().toISOString().split('T')[0];
function calcAge(){
  const dob = document.getElementById('dob').value;
  if(!dob){alert('Please enter your date of birth');return;}
  const b = new Date(dob), n = new Date();
  if(b > n){alert('Date cannot be in the future');return;}
  let y = n.getFullYear()-b.getFullYear(), m = n.getMonth()-b.getMonth(), d = n.getDate()-b.getDate();
  if(d<0){m--;d+=new Date(n.getFullYear(),n.getMonth(),0).getDate();}
  if(m<0){y--;m+=12;}
  const td = Math.floor((n-b)/86400000);
  const th = td*24, tm = th*60;
  document.getElementById('years').textContent = y;
  document.getElementById('months').textContent = m;
  document.getElementById('days').textContent = d;
  document.getElementById('extra').textContent = `Total: ${td.toLocaleString()} days • ${th.toLocaleString()} hours • ${tm.toLocaleString()} minutes`;
  document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
