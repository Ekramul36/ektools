<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter — EkZapp</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563EB;--ink:#111827;--gray:#6B7280;--border:#E5E7EB;--white:#fff;--light:#F9FAFB;--cream:#F0F5FF}
body{font-family:'Inter',sans-serif;background:var(--light);color:var(--ink);min-height:100vh}
nav{background:var(--white);border-bottom:1px solid var(--border);height:54px;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center}
.logo{text-decoration:none;display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:800}
.logo-text{font-size:15px;font-weight:700;color:var(--ink)}
.logo-text span{color:var(--blue)}
.back{margin-left:auto;color:var(--gray);text-decoration:none;font-size:13px;font-weight:500;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:white}
.container{max-width:720px;margin:40px auto;padding:0 20px}
.tool-header{text-align:center;margin-bottom:32px}
.tool-icon{font-size:2.5rem;margin-bottom:12px}
.tool-header h1{font-size:1.8rem;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.tool-header p{color:var(--gray);font-size:14px}
.card{background:white;border:1px solid var(--border);border-radius:12px;padding:24px}
textarea{width:100%;height:220px;padding:14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;resize:vertical;outline:none;transition:border .15s;margin-bottom:16px}
textarea:focus{border-color:var(--blue)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat-box{background:var(--cream);border:1px solid #BFDBFE;border-radius:8px;padding:14px;text-align:center}
.stat-box strong{display:block;font-size:1.5rem;font-weight:800;color:var(--blue)}
.stat-box span{font-size:11px;color:var(--gray);font-weight:500}
.clear-btn{margin-top:12px;padding:8px 20px;background:var(--light);border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="logo" href="/"><div class="logo-icon">EZ</div><span class="logo-text">Ek<span>Zapp</span></span></a>
    <a class="back" href="/">← All Tools</a>
  </div>
</nav>
<div class="container">
  <div class="tool-header">
    <div class="tool-icon">🔢</div>
    <h1>Word Counter</h1>
    <p>Count words, characters and sentences instantly</p>
  </div>
  <div class="card">
    <textarea id="txt" placeholder="Type or paste your text here..." oninput="count()"></textarea>
    <div class="stats">
      <div class="stat-box"><strong id="words">0</strong><span>Words</span></div>
      <div class="stat-box"><strong id="chars">0</strong><span>Characters</span></div>
      <div class="stat-box"><strong id="charsNs">0</strong><span>No Spaces</span></div>
      <div class="stat-box"><strong id="sentences">0</strong><span>Sentences</span></div>
    </div>
    <button class="clear-btn" onclick="document.getElementById('txt').value='';count()">Clear Text</button>
  </div>
</div>
<script>
function count(){
  const t=document.getElementById('txt').value;
  document.getElementById('words').textContent=t.trim()===''?0:t.trim().split(/\s+/).length;
  document.getElementById('chars').textContent=t.length;
  document.getElementById('charsNs').textContent=t.replace(/\s/g,'').length;
  document.getElementById('sentences').textContent=t.trim()===''?0:t.split(/[.!?]+/).filter(s=>s.trim()).length;
}
</script>
</body>
</html>
