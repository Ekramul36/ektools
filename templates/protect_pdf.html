<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protect PDF — EkZapp</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563EB;--blue-dk:#1D4ED8;--blue-lt:#EFF6FF;--ink:#111827;--gray:#6B7280;--border:#E5E7EB;--white:#fff;--light:#F9FAFB}
body{font-family:'Inter',sans-serif;background:var(--light);color:var(--ink);min-height:100vh}
nav{background:var(--white);border-bottom:1px solid var(--border);height:54px;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center;gap:12px}
.logo{text-decoration:none;display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:800}
.logo-text{font-size:15px;font-weight:700;color:var(--ink)}
.logo-text span{color:var(--blue)}
.back{margin-left:auto;color:var(--gray);text-decoration:none;font-size:13px;font-weight:500;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:white}
.container{max-width:600px;margin:48px auto;padding:0 20px}
.tool-header{text-align:center;margin-bottom:32px}
.tool-icon-wrap{width:64px;height:64px;border-radius:16px;background:#DBEAFE;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 16px}
.tool-header h1{font-size:1.8rem;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
.tool-header p{color:var(--gray);font-size:14px}
.card{background:white;border:1px solid var(--border);border-radius:14px;padding:28px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.info-bar{background:var(--blue-lt);border:1px solid #BFDBFE;border-radius:8px;padding:10px 14px;margin-bottom:20px;font-size:13px;color:#1E40AF}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
.drop-area{border:2px dashed var(--border);border-radius:10px;padding:36px 20px;text-align:center;background:var(--light);cursor:pointer;transition:all .2s;position:relative}
.drop-area:hover{border-color:var(--blue);background:var(--blue-lt)}
.drop-icon{font-size:2.2rem;margin-bottom:10px}
.drop-area h3{font-size:14px;font-weight:600;margin-bottom:4px}
.drop-area p{font-size:12px;color:var(--gray)}
.drop-area input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.file-name{font-size:13px;font-weight:600;color:var(--blue);margin-top:8px;display:none}
.field input[type="password"]{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;outline:none}
.field input:focus{border-color:var(--blue)}
.btn{width:100%;padding:13px;background:var(--blue);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;margin-top:4px}
.btn:hover{background:var(--blue-dk)}
.error-box{background:#FFF1F2;border:1px solid #FECDD3;border-radius:8px;padding:12px 16px;color:#DC2626;font-size:13px;margin-bottom:16px}
.trust{display:flex;justify-content:center;gap:20px;margin-top:16px;flex-wrap:wrap}
.trust-item{font-size:12px;color:var(--gray)}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="logo" href="/"><div class="logo-icon">EZ</div><span class="logo-text">Ek<span>Zapp</span></span></a>
    <a class="back" href="/">← All Tools</a>
  </div>
</nav>
<div class="container">
  <div class="tool-header">
    <div class="tool-icon-wrap">🔒</div>
    <h1>Protect PDF</h1>
    <p>Add password protection to your PDF files</p>
  </div>
  <div class="card">
    <div class="info-bar">🔒 Your PDF will be encrypted with the password you set</div>
    {% if error %}<div class="error-box">⚠️ {{ error }}</div>{% endif %}
    <form method="POST" enctype="multipart/form-data">
      <div class="field">
        <label>Select PDF File</label>
        <div class="drop-area">
          <div class="drop-icon">📄</div>
          <h3>Click to select or drag & drop</h3>
          <p>Select the PDF to protect</p>
          <p class="file-name" id="fileName"></p>
          <input type="file" name="pdf" accept=".pdf" required onchange="showFileName(this)">
        </div>
      </div>
      <div class="field">
        <label>Set Password</label>
        <input type="password" name="password" placeholder="Enter a strong password" required>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Confirm your password" required>
      </div>
      <button type="submit" class="btn">🔒 Protect PDF</button>
    </form>
    <div class="trust">
      <div class="trust-item">🔒 SSL Encrypted</div>
      <div class="trust-item">🗑️ Auto-deleted</div>
    </div>
  </div>
</div>
<script>
function showFileName(input){
  if(input.files&&input.files[0]){
    const fn=document.getElementById('fileName');
    fn.textContent='✓ '+input.files[0].name;
    fn.style.display='block';
  }
}
</script>
</body>
</html>
