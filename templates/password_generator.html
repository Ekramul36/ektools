<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — EkZapp</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563EB;--blue-dk:#1D4ED8;--blue-lt:#EFF6FF;--ink:#111827;--gray:#6B7280;--border:#E5E7EB;--white:#fff;--light:#F9FAFB;--green:#16A34A;--red:#DC2626;--yellow:#D97706}
body{font-family:'Inter',sans-serif;background:var(--light);color:var(--ink);min-height:100vh}
nav{background:var(--white);border-bottom:1px solid var(--border);height:54px;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center;gap:12px}
.logo{text-decoration:none;display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:800}
.logo-text{font-size:15px;font-weight:700;color:var(--ink)}
.logo-text span{color:var(--blue)}
.back{margin-left:auto;color:var(--gray);text-decoration:none;font-size:13px;font-weight:500;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:white}
.container{max-width:560px;margin:48px auto;padding:0 20px}
.tool-header{text-align:center;margin-bottom:32px}
.tool-icon-wrap{width:64px;height:64px;border-radius:16px;background:#DCFCE7;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 16px}
.tool-header h1{font-size:1.8rem;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
.tool-header p{color:var(--gray);font-size:14px}
.card{background:white;border:1px solid var(--border);border-radius:14px;padding:28px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.password-display{background:var(--light);border:1.5px solid var(--border);border-radius:10px;padding:16px 20px;font-family:monospace;font-size:1.1rem;font-weight:600;letter-spacing:.05em;word-break:break-all;min-height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.copy-btn{background:var(--blue);color:white;border:none;padding:8px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif}
.strength-bar{height:6px;border-radius:100px;background:var(--border);margin-bottom:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:100px;transition:all .3s;width:0}
.strength-label{font-size:12px;font-weight:600;margin-bottom:16px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;display:flex;justify-content:space-between}
.field label span{color:var(--blue)}
input[type="range"]{width:100%;accent-color:var(--blue)}
.checkboxes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.check-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s}
.check-item:hover{border-color:var(--blue)}
.check-item input{accent-color:var(--blue);width:16px;height:16px}
.check-item span{font-size:13px;font-weight:500}
.btn{width:100%;padding:13px;background:var(--blue);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.btn:hover{background:var(--blue-dk)}
.bulk-section{margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.bulk-section h3{font-size:13px;font-weight:600;margin-bottom:10px}
.bulk-list{background:var(--light);border-radius:8px;padding:12px;font-family:monospace;font-size:12px;min-height:80px;white-space:pre-wrap;word-break:break-all;border:1px solid var(--border)}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="logo" href="/"><div class="logo-icon">EZ</div><span class="logo-text">Ek<span>Zapp</span></span></a>
    <a class="back" href="/">← All Tools</a>
  </div>
</nav>
<div class="container">
  <div class="tool-header">
    <div class="tool-icon-wrap">🔐</div>
    <h1>Password Generator</h1>
    <p>Generate strong, secure passwords instantly</p>
  </div>
  <div class="card">
    <div class="password-display">
      <span id="password">Click Generate</span>
      <button class="copy-btn" onclick="copyPassword()">Copy</button>
    </div>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-label" id="strengthLabel"></div>

    <div class="field">
      <label>Password Length <span id="lengthVal">16</span></label>
      <input type="range" id="length" min="4" max="64" value="16" oninput="document.getElementById('lengthVal').textContent=this.value;generate()">
    </div>

    <div class="checkboxes">
      <label class="check-item"><input type="checkbox" id="upper" checked onchange="generate()"><span>Uppercase (A-Z)</span></label>
      <label class="check-item"><input type="checkbox" id="lower" checked onchange="generate()"><span>Lowercase (a-z)</span></label>
      <label class="check-item"><input type="checkbox" id="numbers" checked onchange="generate()"><span>Numbers (0-9)</span></label>
      <label class="check-item"><input type="checkbox" id="symbols" checked onchange="generate()"><span>Symbols (!@#$)</span></label>
    </div>

    <button class="btn" onclick="generate()">🔐 Generate Password</button>

    <div class="bulk-section">
      <h3>Generate Multiple Passwords</h3>
      <button class="btn" style="margin-bottom:10px;background:#374151" onclick="generateBulk()">Generate 10 Passwords</button>
      <div class="bulk-list" id="bulkList"></div>
    </div>
  </div>
</div>
<script>
const upper='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const lower='abcdefghijklmnopqrstuvwxyz';
const nums='0123456789';
const syms='!@#$%^&*()_+-=[]{}|;:,.<>?';

function getChars(){
  let c='';
  if(document.getElementById('upper').checked)c+=upper;
  if(document.getElementById('lower').checked)c+=lower;
  if(document.getElementById('numbers').checked)c+=nums;
  if(document.getElementById('symbols').checked)c+=syms;
  return c||lower;
}

function generatePassword(len){
  const chars=getChars();
  let pwd='';
  for(let i=0;i<len;i++)pwd+=chars[Math.floor(Math.random()*chars.length)];
  return pwd;
}

function getStrength(pwd){
  let score=0;
  if(pwd.length>=8)score++;
  if(pwd.length>=12)score++;
  if(pwd.length>=16)score++;
  if(/[A-Z]/.test(pwd))score++;
  if(/[a-z]/.test(pwd))score++;
  if(/[0-9]/.test(pwd))score++;
  if(/[^A-Za-z0-9]/.test(pwd))score++;
  if(score<=2)return{label:'Weak',color:'#DC2626',pct:25};
  if(score<=4)return{label:'Fair',color:'#D97706',pct:50};
  if(score<=5)return{label:'Good',color:'#2563EB',pct:75};
  return{label:'Strong',color:'#16A34A',pct:100};
}

function generate(){
  const len=parseInt(document.getElementById('length').value);
  const pwd=generatePassword(len);
  document.getElementById('password').textContent=pwd;
  const s=getStrength(pwd);
  document.getElementById('strengthFill').style.width=s.pct+'%';
  document.getElementById('strengthFill').style.background=s.color;
  document.getElementById('strengthLabel').textContent='Strength: '+s.label;
  document.getElementById('strengthLabel').style.color=s.color;
}

function copyPassword(){
  const pwd=document.getElementById('password').textContent;
  navigator.clipboard.writeText(pwd).then(()=>{
    const btn=document.querySelector('.copy-btn');
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy',2000);
  });
}

function generateBulk(){
  const len=parseInt(document.getElementById('length').value);
  const list=Array.from({length:10},()=>generatePassword(len));
  document.getElementById('bulkList').textContent=list.join('\n');
}

generate();
</script>
</body>
</html>
